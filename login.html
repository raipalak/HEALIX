<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access - Healix Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --accent: #2563eb;
  --shadow: 0 20px 50px rgba(0,0,0,0.05);
}

body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

.login-card { background: var(--card); width: 100%; max-width: 450px; border-radius: 40px; padding: 50px; box-shadow: var(--shadow); text-align: center; position: relative; }

.role-switcher { display: flex; background: #f8fafc; padding: 5px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
.role-btn { flex: 1; padding: 10px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; background: transparent; color: #64748b; font-size: 12px; transition: 0.3s; }
.role-btn.active { background: white; color: var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

.input-group { margin-bottom: 20px; text-align: left; }
.input-group label { display: block; font-size: 11px; font-weight: 900; opacity: 0.5; text-transform: uppercase; margin-bottom: 8px; margin-left: 10px; }
.input-group input { width: 100%; padding: 16px 20px; border-radius: 18px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 14px; box-sizing: border-box; background: #f8fafc; }

.btn-login { width: 100%; padding: 18px; border: none; border-radius: 18px; background: var(--accent); color: white; font-weight: 900; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); transition: 0.3s; }
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3); }

.status-msg { font-size: 12px; margin-top: 20px; font-weight: 600; min-height: 18px; }

.logo-icon { font-size: 42px; margin-bottom: 20px; display: block; }
</style>
</head>
<body>

<div class="login-card">
  <span class="logo-icon">🏥</span>
  <h1 style="margin:0 0 10px 0; font-weight:900; letter-spacing:-1px;">Healix Gateway</h1>
  <p style="margin:0 0 40px 0; font-size:14px; font-weight:600; opacity:0.5;">Enter your clinical credentials to proceed</p>

  <div class="role-switcher">
    <button class="role-btn active" onclick="setRole('patient', this)">Patient</button>
    <button class="role-btn" onclick="setRole('doctor', this)">Doctor</button>
    <button class="role-btn" onclick="setRole('admin', this)">Admin</button>
  </div>

  <div class="input-group">
    <label>Identifier / Email</label>
    <input type="text" id="username" placeholder="Enter your unique ID">
  </div>

  <div class="input-group">
    <label>Security Key / Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="handleLogin()">Authorize Access</button>

  <div id="status" class="status-msg"></div>
</div>

<script>
let currentRole = 'patient';

function setRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  const userField = document.getElementById('username');
  if(role === 'patient') userField.placeholder = "Enter Patient ID (e.g. PAT101)";
  if(role === 'doctor') userField.placeholder = "Enter Doctor ID (e.g. DOC202)";
  if(role === 'admin') userField.placeholder = "Enter Admin Username";
}

function handleLogin() {
  const status = document.getElementById('status');
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  if(!user || !pass) {
    status.style.color = '#ef4444';
    status.innerText = "🚨 Please enter valid clinical credentials.";
    return;
  }

  status.style.color = '#10b981';
  status.innerHTML = "🔓 Authorization Granted. Redirecting to " + currentRole.toUpperCase() + " HUB...";

  setTimeout(() => {
    if(currentRole === 'patient') window.location.href = 'pateintportal.html';
    if(currentRole === 'doctor') window.location.href = 'doctorportal.html';
    if(currentRole === 'admin') window.location.href = 'admin_dashboard.html';
  }, 1500);
}
</script>

</body>
</html>
